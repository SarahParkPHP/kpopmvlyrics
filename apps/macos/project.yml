# XcodeGen spec — run `xcodegen generate` in this directory to produce Kpml.xcodeproj.
name: Kpml
options:
  bundleIdPrefix: com.kpopmvlyrics
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

targets:
  Kpml:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Generated/kpopmvlyrics_lib.swift
    info:
      path: Info.plist
      properties:
        CFBundleName: K-Pop MV Lyrics
        CFBundleShortVersionString: "0.1.0"
        LSMinimumSystemVersion: "13.0"
        NSHighResolutionCapable: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kpopmvlyrics.macos
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        # Find the generated UniFFI C module (module.modulemap + header).
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/Generated"
        # Link the universal Rust static library produced by build-rust.sh.
        LIBRARY_SEARCH_PATHS: "$(SRCROOT)/Libs"
        OTHER_LDFLAGS: "-lkpopmvlyrics_lib -F/Library/Frameworks -framework GStreamer"
        # Allow the pre-build script to write generated files into the source tree.
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    preBuildScripts:
      - name: Build Rust core + bindings
        basedOnDependencyAnalysis: false
        script: |
          if [ "$CONFIGURATION" = "Release" ]; then PROFILE=release; else PROFILE=debug; fi
          "$SRCROOT/Scripts/build-rust.sh" "$PROFILE"
